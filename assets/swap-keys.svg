<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140">
  <defs>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2E"/>
      <stop offset="100%" stop-color="#1C1C20"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Left key: Right Command -->
  <g filter="url(#shadow)">
    <rect x="20" y="15" width="180" height="110" rx="16" fill="url(#keyGrad)" stroke="#3F3F46" stroke-width="1.5"/>
    <text x="110" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" fill="#FAFAFA">&#8984;</text>
    <text x="110" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#A1A1AA">Right Command</text>
  </g>

  <!-- Swap arrow -->
  <text x="260" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" fill="#22D3EE">&#8644;</text>

  <!-- Right key: Right Option -->
  <g filter="url(#shadow)">
    <rect x="320" y="15" width="180" height="110" rx="16" fill="url(#keyGrad)" stroke="#3F3F46" stroke-width="1.5"/>
    <text x="410" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" fill="#FAFAFA">&#8997;</text>
    <text x="410" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#A1A1AA">Right Option</text>
  </g>
</svg>
